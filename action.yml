name: GitHub Readme Stats Action
description: Generate GitHub Readme Stats cards in GitHub Actions.
author: readme-tools
inputs:
  card:
    description: Card type to generate (stats, top-langs, pin, wakatime, gist).
    required: true
  options:
    description: Options for the card (query string or JSON).
    required: false
    default: ""
  path:
    description: Output path for SVG file (relative path; include filename with .svg).
    required: false
    default: ""
  token:
    description: GitHub token (PAT or GITHUB_TOKEN).
    required: false
    default: ""
  core_version:
    description: Version of @stats-organization/github-readme-stats-core to use internally.
    required: false
    default: "v2"
outputs:
  path:
    description: Path where the SVG file was written.
runs:
  using: composite
  steps:
    - name: Resolve relative path to package.json
      id: resolve_path
      run: echo "package_json=$(realpath --relative-to="$GITHUB_WORKSPACE" "${{ github.action_path }}/package.json")" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      with:
        package_json_file: ${{ steps.resolve_path.outputs.package_json }}
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Generate card
      run: node ${{ github.action_path }}/index.js
      shell: bash
      env:
        INPUT_CARD: ${{ inputs.card }}
        INPUT_OPTIONS: ${{ inputs.options }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_CORE_VERSION: ${{ inputs.core_version }}
        PAT_1: ${{ inputs.token || github.token }}
branding:
  icon: bar-chart-2
  color: blue
