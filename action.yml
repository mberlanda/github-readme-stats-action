name: GitHub Readme Stats Action
description: Generate GitHub Readme Stats cards in GitHub Actions.
author: stats-organization
inputs:
  card:
    description: Card type to generate (stats, top-langs, pin, wakatime, gist).
    required: true
  options:
    description: Options for the card (query string or JSON).
    required: false
    default: ""
  path:
    description: Output path for SVG file (relative path; include filename with .svg).
    required: false
    default: ""
  token:
    description: GitHub token (PAT or GITHUB_TOKEN).
    required: false
    default: ""
  core_version:
    description: Version of @stats-organization/github-readme-stats-core to use internally. When omitted, uses the bundled local fork.
    required: false
    default: ""
  core_package:
    description: npm package name for the stats core. Useful when pointing to a custom fork published under a different scope.
    required: false
    default: ""
  min_stars_to_paginate:
    description: Minimum star count a repo must have for star-based pagination to continue. Set to 0 to paginate through all repos regardless of stars (default 1, matching upstream behaviour).
    required: false
    default: "0"
  fetch_multi_page_stars:
    description: Enable multi-page fetching for star counts. Set to true to count stars across all repo pages, not just the first 100.
    required: false
    default: "true"
outputs:
  path:
    description: Path where the SVG file was written.
    value: ${{ steps.generate.outputs.path }}
runs:
  using: composite
  steps:
    # pnpm/action-setup's `package_json_file` and setup-node's `node-version-file` are both
    # resolved relative to $GITHUB_WORKSPACE, but our package.json lives under
    # ${{ github.action_path }} — convert to a workspace-relative path.
    - name: Compute workspace-relative package.json path
      id: resolve_path
      run: echo "package_json=$(realpath --relative-to="$GITHUB_WORKSPACE" "${{ github.action_path }}/package.json")" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Install pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        package_json_file: ${{ steps.resolve_path.outputs.package_json }}
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ${{ steps.resolve_path.outputs.package_json }}
    - name: Install dependencies
      # --prod skips devDependencies (husky, vitest, etc.); --ignore-scripts skips the
      # husky prepare hook, which would otherwise fail since husky isn't installed.
      # https://github.com/stats-organization/github-readme-stats-action/issues/63
      run: pnpm install --frozen-lockfile --prod --ignore-scripts
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Generate card
      id: generate
      run: node ${{ github.action_path }}/index.js
      shell: bash
      env:
        INPUT_CARD: ${{ inputs.card }}
        INPUT_OPTIONS: ${{ inputs.options }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_CORE_VERSION: ${{ inputs.core_version }}
        INPUT_CORE_PACKAGE: ${{ inputs.core_package }}
        PAT_1: ${{ inputs.token || github.token }}
        MIN_STARS_TO_PAGINATE: ${{ inputs.min_stars_to_paginate }}
        FETCH_MULTI_PAGE_STARS: ${{ inputs.fetch_multi_page_stars }}
branding:
  icon: bar-chart-2
  color: blue
